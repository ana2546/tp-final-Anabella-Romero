<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="/css/styles.css">

</head>

<body>

<h1>🐾 Patitas Felices</h1>

<button id="logoutBtn">
Cerrar sesión
</button>

<hr>

<h2>Buscar mascota</h2>

<input
type="text"
id="searchInput"
placeholder="Buscar por mascota o dueño"
/>

<hr>

<h2>Agregar mascota</h2>

<input id="nombre" placeholder="Nombre">
<input id="especie" placeholder="Especie">
<input id="fecha" type="date">
<input id="dueno" placeholder="ID dueño">

<button id="addPetBtn">
Agregar mascota
</button>

<hr>

<h2>Animales registrados</h2>

<table border="1">

<thead>

<tr>

<th>Mascota</th>
<th>Dueño</th>
<th>Veterinario</th>
<th>Historial</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="animalsTable">
</tbody>

</table>

<script src="/js/dashboard.js"></script>

</body>

</html>
