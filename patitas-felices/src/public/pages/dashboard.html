<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard - Patitas Felices</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="contenedor-dashboard">
    <header class="encabezado-dashboard">
      <div>
        <h1>🐾 Patitas Felices</h1>
        <p id="textoBienvenida">Panel principal</p>
      </div>

      <div class="acciones-encabezado">
        <button id="btnCargarCliente" class="boton-primario oculto">
          Cargar cliente
        </button>

        <button id="btnRegistrarUsuario" class="boton-primario oculto">
          Registrar veterinario
        </button>

        <button id="btnGestionUsuarios" class="boton-primario oculto">
          Modificar/eliminar Usuario
        </button>

        <button id="logoutBtn" class="boton-secundario">
          Cerrar sesión
        </button>
      </div>
    </header>

    <main>
      <section class="tarjeta">
        <h2>Buscar animales</h2>
        <input
          type="text"
          id="searchInput"
          placeholder="Buscar por nombre de mascota o dueño"
          class="input-ancho"
        />
      </section>

      <section class="tarjeta">
        <div class="encabezado-seccion">
          <h2>Animales registrados</h2>
          <p id="textoRol"></p>
        </div>

        <div class="tabla-contenedor">
          <table>
            <thead>
              <tr>
                <th>Mascota</th>
                <th>Dueño</th>
                <th>Veterinario</th>
                <th>Último historial</th>
                <th>Acciones</th>
              </tr>
            </thead>

            <tbody id="animalsTable"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
