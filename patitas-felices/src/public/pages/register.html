<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>
<link rel="stylesheet" href="/css/styles.css">
</head>

<body>

<h2>Registro</h2>

<form id="registerForm">

<input
type="text"
id="username"
placeholder="Nombre"
required
/>

<input
type="email"
id="email"
placeholder="Email"
required
/>

<input
type="password"
id="password"
placeholder="Password"
required
/>

<button type="submit">
Registrarse
</button>

</form>

<p>
¿Ya tienes cuenta?
<a href="/">Login</a>
</p>

<script src="/js/register.js"></script>

</body>
</html>
