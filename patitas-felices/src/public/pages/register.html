<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Registrar veterinario - Patitas Felices</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="contenedor-dashboard">
    <header class="encabezado-dashboard">
      <div>
        <h1>👨‍⚕️ Registrar usuario veterinario</h1>
        <p>Solo administradores pueden crear y administrar veterinarios</p>
      </div>

      <div class="acciones-encabezado">
        <button id="btnVolverDashboard" class="boton-secundario">
          Volver al dashboard
        </button>
      </div>
    </header>

    <main class="contenedor-formularios">
      <section class="tarjeta">
        <h2>Datos de acceso</h2>

        <div class="grilla-formulario">
          <div class="campo">
            <label for="username">Nombre de usuario</label>
            <input type="text" id="username" />
          </div>

          <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" />
          </div>

          <div class="campo campo-completo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" />
          </div>
        </div>
      </section>

      <section class="tarjeta">
        <h2>Datos del veterinario</h2>

        <div class="grilla-formulario">
          <div class="campo">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" />
          </div>

          <div class="campo">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" />
          </div>

          <div class="campo">
            <label for="matricula">Matrícula</label>
            <input type="text" id="matricula" />
          </div>

          <div class="campo">
            <label for="especialidad">Especialidad</label>
            <input type="text" id="especialidad" />
          </div>
        </div>

        <div class="acciones-formulario">
          <button id="btnRegistrar" class="boton-primario">
            Registrar usuario veterinario
          </button>
        </div>
      </section>

      <section class="tarjeta">
        <div class="encabezado-seccion">
          <h2>Veterinarios registrados</h2>
          <button id="btnRecargarVeterinarios" class="boton-secundario">
            Recargar lista
          </button>
        </div>

        <div class="tabla-contenedor">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Matrícula</th>
                <th>Especialidad</th>
                <th>ID usuario</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaVeterinarios"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/register.js"></script>
</body>
</html>
