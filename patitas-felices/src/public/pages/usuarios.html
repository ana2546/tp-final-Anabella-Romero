<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Gestionar usuarios - Patitas Felices</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="contenedor-dashboard">
    <header class="encabezado-dashboard">
      <div>
        <h1>👤 Modificar / eliminar usuarios</h1>
        <p>Administración de usuarios del sistema</p>
      </div>

      <div class="acciones-encabezado">
        <button id="btnVolverDashboard" class="boton-secundario">
          Volver al dashboard
        </button>
      </div>
    </header>

    <main class="contenedor-formularios">
      <section class="tarjeta">
        <h2>Usuarios cargados</h2>

        <div class="tabla-contenedor">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre de usuario</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaUsuarios"></tbody>
          </table>
        </div>
      </section>

      <section class="tarjeta oculto" id="seccionEditarUsuario">
        <h2>Modificar usuario</h2>

        <div class="grilla-formulario">
          <div class="campo">
            <label for="editarUsername">Nombre de usuario</label>
            <input type="text" id="editarUsername" />
          </div>

          <div class="campo">
            <label for="editarEmail">Email</label>
            <input type="email" id="editarEmail" />
          </div>
        </div>

        <div class="acciones-formulario">
          <button id="btnCancelarEdicion" class="boton-secundario">
            Cancelar
          </button>
          <button id="btnGuardarEdicion" class="boton-primario">
            Guardar cambios
          </button>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/usuarios.js"></script>
</body>
</html>
